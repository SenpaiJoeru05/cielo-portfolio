<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5b21b6"/>
      <stop offset="45%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- base rounded square -->
  <rect width="100" height="100" rx="24" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- top shine overlay -->
  <rect width="100" height="52" rx="24" fill="url(#shine)"/>

  <!-- subtle inner border -->
  <rect x="2" y="2" width="96" height="96" rx="22" fill="none" stroke="white" stroke-opacity="0.12" stroke-width="1.5"/>

  <!-- MC text -->
  <text
    x="50" y="63"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="40"
    font-weight="bold"
    fill="white"
    text-anchor="middle"
    letter-spacing="-1"
    filter="url(#shadow)"
  >MC</text>
</svg>
